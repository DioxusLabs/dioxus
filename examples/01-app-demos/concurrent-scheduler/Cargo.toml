[package]
name = "concurrent-scheduler"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
async-std = "1.13.1"
dioxus = { workspace = true }
dioxus-core = { workspace = true }
wasm-bindgen = { workspace = true, optional = true }
web-time = "1.1.0"

[features]
default = ["desktop"]
desktop = ["dioxus/desktop"]
web = ["dioxus/web", "dep:wasm-bindgen"]
